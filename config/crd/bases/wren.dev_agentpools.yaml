  name: agentpools.wren.dev
spec:
  group: wren.dev
  names:
    kind: AgentPool
    listKind: AgentPoolList
    plural: agentpools
    singular: agentpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
