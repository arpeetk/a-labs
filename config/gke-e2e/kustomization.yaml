apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GKE end-to-end overlay: same topology as config/default but pulls images from
# Artifact Registry and patches the operator's --runtime-image arg to match.
# Applied by hack/e2e-gke.sh; not intended for production use.
resources:
- ../default

# Redirect all three control-plane images to the Artifact Registry path.
# The runtime image is also overridden via the operator arg patch below.
images:
- name: wren/operator:dev
  newName: us-central1-docker.pkg.dev/wren-gke-fdea81/wren/operator
  newTag: ws1
- name: wren/apiserver:dev
  newName: us-central1-docker.pkg.dev/wren-gke-fdea81/wren/apiserver
  newTag: ws1

patches:
# Replace the operator's --runtime-image arg with the AR path so agent pods
# pull the same ws1 runtime image that has the egress-lockdown binary baked in.
# Also set imagePullPolicy:Always so stale cached layers don't shadow a push.
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wren-operator
      namespace: wren-system
    spec:
      template:
        spec:
          containers:
          - name: operator
            args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --runtime-image=us-central1-docker.pkg.dev/wren-gke-fdea81/wren/runtime:ws1
            imagePullPolicy: Always
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wren-apiserver
      namespace: wren-system
    spec:
      template:
        spec:
          containers:
          - name: apiserver
            imagePullPolicy: Always
