apiVersion: v1
kind: Namespace
metadata:
  name: user-arpeet
---
apiVersion: wren.dev/v1alpha1
kind: AgentRun
metadata:
  name: r-demo
  namespace: user-arpeet
spec:
  project: payments-api
  user: arpeet@corp.com
  harness:
    kind: claude-code
    image: registry.example.com/claude-code-runner:1.0
    model: claude-opus-4-8
  task:
    prompt: "Add idempotency keys to the refund endpoint; cover with tests."
    baseRef: main
  interactive: false
  sandbox:
    runtimeClass: runc
    resources:
      cpu: "1"
      memory: 2Gi
      ephemeralDisk: 5Gi
  workspace:
    pvc:
      storageClass: standard   # kind's default local-path StorageClass
      size: 1Gi
    # v0.1 crash-resume = reattach this PVC (stable name) + restart the harness
    # in resume mode. The checkpoint block below is ACCEPTED BUT NO-OP in v0.1:
    # the checkpointer sidecar is an experimental liveness stub and no snapshots
    # are taken (object-store checkpointing is post-launch, plugging into
    # internal/blob.Store — spec §5.5). A node/zone loss that destroys the PVC
    # therefore ends the run Failed with diagnostics instead of restoring.
    checkpoint:
      intervalSeconds: 120
      bucket: gs://wren-ckpt
  egress:
    allowlist: [api.anthropic.com, github.com]
  retry:
    maxRestarts: 5
    backoff: exponential
