apiVersion: v1
kind: Namespace
metadata:
  name: wren-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wren-operator
  namespace: wren-system
  labels:
    app.kubernetes.io/name: wren-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wren-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wren-operator
    spec:
      serviceAccountName: wren-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: operator
        image: wren/operator:dev
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        # The image agent pods pull for sidecar/init roles. Override per cluster
        # (e.g. an Artifact Registry path on GKE).
        - --runtime-image=wren/runtime:dev
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - name: metrics
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
