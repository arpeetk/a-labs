# Permissions the operator needs for leader election (coordination.k8s.io leases
# plus events), scoped to its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wren-operator-leader-election
  namespace: wren-system
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wren-operator-leader-election
  namespace: wren-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wren-operator-leader-election
subjects:
- kind: ServiceAccount
  name: wren-operator
  namespace: wren-system
