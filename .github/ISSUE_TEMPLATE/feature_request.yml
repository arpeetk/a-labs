name: Feature request
description: Propose a new capability or enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: >-
        For anything larger than a small enhancement, please open this to align
        on the approach before writing code — Wren has a strong architectural
        spine and we'd rather agree early. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Wren doesn't (well) support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the CLI/API/behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to the relevant spec section, milestone, or related issues.
    validations:
      required: false
