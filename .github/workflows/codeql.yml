name: CodeQL

# GitHub CodeQL static analysis for Go. Default query suite. Runs on PRs, main
# pushes, and a weekly schedule so newly disclosed patterns are caught even
# without a new commit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 07:00 UTC.
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # required for CodeQL to upload results.
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: autobuild
        uses: github/codeql-action/autobuild@v3

      - name: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
